<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="hr">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>FarmTrack</title>
    <style>
        body {
            background-color: #87b88a; /* Šumska zelena */
            color: #ffffff;            /* Bijeli tekst radi kontrasta */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Stil za navigacijski bar */
        .navbar {
            background-color: #1b5e20; /* Tamno zelena za nav bar */
            padding: 15px 30px;
            display: flex;
            gap: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .navbar a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: color 0.3s;
        }

        .navbar a:hover {
            color: #a5d6a7; /* Svijetlo zelena kada se prođe mišem */
        }

        .content-container {
            padding: 30px;
        }
    </style>
</head>
<body>

<nav th:fragment="navbar" class="navbar">
    <a th:href="@{/}">Početna</a>
    <a th:href="@{/zivotinje}">Popis životinja</a>
    <a th:href="@{/pregledi}">Zdravstveni kartoni-pregled</a>
</nav>

<div class="content-container">
    <div th:replace="${content}"></div>
</div>

</body>
</html>
