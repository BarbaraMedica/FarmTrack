<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="hr">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>FarmTrack</title>
    <style>
        body {
            background-color: #87b88a !important; /* Šumska zelena */
            color: #ffffff !important;            /* Bijeli tekst radi kontrasta */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Stil za navigacijski bar */
        .navbar {
            background-color: #1b5e20; /* Tamno zelena za nav bar */
            padding: 15px 30px;
            display: flex;
            gap: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .navbar a {
            text-decoration: none;
        }

        .navbar .btn {
            background-color: #4caf50;
            color: #ffffff;
            font-weight: bold;
            font-size: 16px;
            border: 2px solid #2e7d32;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.2s, border-color 0.3s;
            cursor: pointer;
        }

        .navbar .btn:hover {
            background-color: #45a049;
            border-color: #1b5e20;
            transform: translateY(-2px);
            color: #ffffff;
            text-decoration: none;
        }

        .navbar .btn:active {
            transform: translateY(0);
        }

        .content-container {
            padding: 30px;
        }
    </style>
</head>
<body>

<nav th:fragment="navbar" class="navbar">
    <a th:href="@{/}" class="btn">Početna</a>
    <a th:href="@{/zivotinje}" class="btn">Popis životinja</a>
    <a th:href="@{/pregledi}" class="btn">Zdravstveni kartoni-pregled</a>
</nav>

<div class="content-container">
    <div th:replace="${content}"></div>
</div>

</body>
</html>
