<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Početna</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{layout :: navbar}"></div>

    <div th:fragment="content">

        <div class="container mt-5" >

            <h1 class="text-success">FarmTrack početna</h1>

            <p>Dobrodošli u sustav za upravljanje farmom goveda.</p>

            <div class="row mt-4">

                <div class="col-md-6">
                    <div class="card shadow">
                        <div class="card-body text-center">
                            <h3>Životinje</h3>
                            <h1 th:text="${brojZivotinja}"></h1>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card shadow">
                        <div class="card-body text-center">
                            <h3>Medicinski pregledi</h3>
                            <h1 th:text="${brojPregleda}"></h1>
                        </div>
                    </div>
                </div>

            </div>

            <div class="mt-4 text-center">
                <a class="btn btn-success" href="/zivotinje">
                    Upravljanje životinjama
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
