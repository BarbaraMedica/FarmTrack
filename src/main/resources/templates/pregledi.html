<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Veterinsrski pregledi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div th:replace="~{layout :: navbar}"></div>

<div class="container mt-4">

    <h2 class="mb-4">Veterinarski pregledi</h2>

    <table class="table table-bordered table-hover">

        <thead class="table-success">
        <tr>
            <th>Životinja</th>
            <th>Datum pregleda</th>
            <th>Terapija</th>
            <th>Količina mlijeka</th>
            <th>Bilješke</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="pregled : ${pregledi}">
            <td th:text="${pregled.animal.ime}"></td>
            <td th:text="${pregled.datumPregleda}"></td>
            <td th:text="${pregled.terapija}"></td>
            <td th:text="${pregled.kolicinaMlijeka}"></td>
            <td th:text="${pregled.biljeske}"></td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
