<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Novi pregled</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">
            <h3 class="mb-0">Medicinski pregled</h3>
        </div>

        <div class="card-body">

            <form th:action="@{/pregledi/spremi}"
                  th:object="${pregled}"
                  method="post">

                <input type="hidden"
                       th:field="*{animal.id}">

                <div class="mb-3">
                    <label class="form-label">
                        Datum pregleda
                    </label>

                    <input type="date"
                           class="form-control"
                           th:field="*{datumPregleda}">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Terapija / Cijepljenje
                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{terapija}">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Količina mlijeka (L)
                    </label>

                    <input type="number"
                           step="0.1"
                           class="form-control"
                           th:field="*{kolicinaMlijeka}">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Bilješke veterinara
                    </label>

                    <textarea class="form-control"
                              rows="4"
                              th:field="*{biljeske}">
                    </textarea>
                </div>

                <button type="submit"
                        class="btn btn-success">
                    Spremi pregled
                </button>

                <a th:href="@{/zivotinje/{id}(id=*{animal.id})}"
                   class="btn btn-secondary">
                    Odustani
                </a>

            </form>

        </div>

    </div>
</div>
</div>



</body>
</html>
