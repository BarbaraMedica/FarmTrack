<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="eng">
<head>
    <title>Forma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<div class="container mt-4">

    <h1 class="text-success">Životinja</h1>

    <form th:action="@{/zivotinje/spremi}"
          th:object="${zivotinja}"
          method="post"
          class="card p-4 shadow">

        <input type="hidden" th:field="*{id}">

        <div class="mb-2">
            <label>Ime</label>
            <input class="form-control" th:field="*{ime}">
        </div>

        <div class="mb-2">
            <label>Markica</label>
            <input class="form-control" th:field="*{brojMarkice}">
        </div>

        <div class="mb-2">
            <label>Pasmina</label>
            <input class="form-control" th:field="*{pasmina}">
        </div>

        <div class="mb-2">
            <label>Spol</label>
            <input type="radio" th:field="*{spol}" value="M"> Muško
            <input type="radio" th:field="*{spol}" value="Ž"> Žensko
        </div>

        <div class="mb-2">
            <label>Datum rođenja</label>
            <input type="date" class="form-control" th:field="*{datumRodenja}">
        </div>

        <div class="mb-2">
            <label>Status</label>
            <input class="form-control" th:field="*{status}">
        </div>

        <button type="submit" class="btn btn-success">Spremi</button>

    </form>
</div>



</body>
</html>
