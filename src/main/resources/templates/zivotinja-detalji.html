<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalji životinje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{layout :: navbar}"></div>

        <div class="container mt-4">

            <!-- NASLOV -->
            <h2 class="text-success mb-4">
                 Karton životinje
            </h2>

            <!-- GLAVNI KARTON -->
            <div class="card border-success shadow-lg">

                <div class="card-header bg-success text-white">
                    <h4 th:text="${zivotinja.ime}"></h4>
                </div>

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-6">
                            <p><b>Broj markice:</b> <span th:text="${zivotinja.brojMarkice}"></span></p>
                            <p><b>Pasmina:</b> <span th:text="${zivotinja.pasmina}"></span></p>
                            <p><b>Spol:</b> <span th:text="${zivotinja.spol}"></span></p>
                        </div>

                        <div class="col-md-6">
                            <p><b>Datum rođenja:</b> <span th:text="${zivotinja.datumRodenja}"></span></p>
                            <p>
                                <b>Status:</b>
                                <span class="badge bg-success"
                                      th:text="${zivotinja.status}">
                                </span>
                            </p>
                        </div>

                    </div>

                </div>

            </div>

            <!-- AKCIJE -->
            <div class="mt-4">

                <a class="btn btn-success"
                   th:href="@{'/zivotinje/uredi/' + ${zivotinja.id}}">
                     Uredi
                </a>

                <a class="btn btn-danger"
                   th:href="@{'/zivotinje/obrisi/' + ${zivotinja.id}}">
                     Obriši
                </a>

                <a class="btn btn-info"
                   th:href="@{'/pregledi/novi/' + ${zivotinja.id}}">
                     Novi pregled
                </a>

                <a class="btn btn-outline-success"
                   href="/zivotinje">
                     Natrag
                </a>

            </div>

            <!-- ZDRAVSTVENI KARTONI -->
            <div class="mt-5">
                <h3 class="text-success mb-3">Zdravstveni kartoni</h3>
                
                <div th:if="${zivotinja.medicinskiZapisi == null or zivotinja.medicinskiZapisi.isEmpty()}" 
                     class="alert alert-info">
                    Nema dostupnih pregleda. Dodaj prvi pregled klikom na "Novi pregled" gumb.
                </div>

                <table th:if="${zivotinja.medicinskiZapisi != null and !zivotinja.medicinskiZapisi.isEmpty()}"
                       class="table table-bordered table-hover">
                    <thead class="table-success">
                        <tr>
                            <th>Datum</th>
                            <th>Terapija</th>
                            <th>Količina mlijeka</th>
                            <th>Bilješke</th>
                            <th>Akcije</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="pregled : ${zivotinja.medicinskiZapisi}">
                            <td th:text="${pregled.datumPregleda}"></td>
                            <td th:text="${pregled.terapija}"></td>
                            <td th:text="${pregled.kolicinaMlijeka}"></td>
                            <td th:text="${pregled.biljeske}"></td>
                            <td>
                                <a class="btn btn-sm btn-warning"
                                   th:href="@{'/pregledi/uredi/' + ${pregled.id}}">
                                    Uredi
                                </a>
                                <a class="btn btn-sm btn-danger"
                                   th:href="@{'/pregledi/obrisi/' + ${pregled.id}}">
                                    Obriši
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>

    </div>

</div>

</body>
</html>
